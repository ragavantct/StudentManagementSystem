<div class="dialog-container">
<h2>Student Form</h2>

<form [formGroup]="form">

  <mat-form-field appearance="outline">
    <input matInput placeholder="Name" formControlName="name">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <input matInput placeholder="Email" formControlName="email">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <input matInput placeholder="Mobile" formControlName="mobile">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-select placeholder="Course" formControlName="course">
      <mat-option value="BSC">BSC</mat-option>
      <mat-option value="BCOM">BCOM</mat-option>
      <mat-option value="BBA">BBA</mat-option>
      <mat-option value="BE">BE</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-select placeholder="Status" formControlName="status">
      <mat-option value="Active">Active</mat-option>
      <mat-option value="Inactive">Inactive</mat-option>
    </mat-select>
  </mat-form-field>

  <br><br>

  <button mat-raised-button color="primary" (click)="save()">Save</button>
  <button mat-button (click)="close()">Cancel</button>

</form>
</div>
